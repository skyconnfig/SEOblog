<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LXSBest Admin</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p { color: #64748b; font-size: 14px; margin: 8px 0 24px; }
  .status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
  .status.online { background: #dcfce7; color: #166534; }
  .status.offline { background: #fee2e2; color: #991b1b; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .2s; }
  .btn-primary { background: #2d6dc3; color: #fff; }
  .btn-primary:hover { background: #1a5aad; transform: translateY(-1px); }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover { background: #16a34a; transform: translateY(-1px); }
  .links { margin-top: 20px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .links a { color: #2d6dc3; font-size: 13px; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .cmd { background: #1a2332; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; font-family: monospace; font-size: 13px; margin: 12px 0; display: inline-block; }
</style>
</head>
<body>
  <div class="card">
    <h1>LXSBest Admin</h1>
    <p>Content management dashboard</p>

    <div id="status-indicator" class="status offline">● Server Offline</div>

    <a id="launch-btn" class="btn btn-primary" style="pointer-events:none;opacity:.5;">Launch Admin →</a>

    <div class="links">
      <a href="http://localhost:4326" target="_blank">Site Preview</a>
      <a href="http://localhost:3002" target="_blank">Admin Server</a>
    </div>

    <p style="margin-top: 24px; font-size: 12px; color: #94a3b8;">
      Start server: <span class="cmd">npm run admin</span>
    </p>
  </div>

  <script>
    (async function() {
      const status = document.getElementById('status-indicator');
      const btn = document.getElementById('launch-btn');

      // Check if admin server is running
      try {
        const res = await fetch('http://localhost:3002/', { mode: 'no-cors' });
        status.className = 'status online';
        status.innerHTML = '● Server Online';
        status.style.background = '#dcfce7';
        status.style.color = '#166534';
        btn.href = 'http://localhost:3002/';
        btn.style.pointerEvents = 'auto';
        btn.style.opacity = '1';
        btn.textContent = 'Open Admin →';
      } catch {
        // Server not running, show start instructions
        status.className = 'status offline';
        status.innerHTML = '● Server Offline';
        status.style.background = '#fee2e2';
        status.style.color = '#991b1b';
        btn.textContent = 'Start Server First';

        // Try again in 2 seconds (server might be starting)
        setTimeout(async () => {
          try {
            await fetch('http://localhost:3002/', { mode: 'no-cors' });
            location.reload();
          } catch {}
        }, 2000);
      }
    })();
  </script>
</body>
</html>
